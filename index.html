<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora</title>
  <link rel="stylesheet" href="style.css" />
  <!-- Google Fonts: Cormorant Garamond (display) + DM Mono (números) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Container principal da calculadora -->
  <div class="calculator" id="calculator">

    <!-- ── DISPLAY ── -->
    <div class="display">
      <!-- Linha de expressão (ex: 5 + 3 ×) -->
      <div class="display__expression" id="expression" aria-live="polite"></div>
      <!-- Linha do valor atual / resultado -->
      <div class="display__value" id="display">0</div>
    </div>

    <!-- ── TECLADO ── -->
    <div class="keypad">

      <!-- Linha 1: C  ⌫  %  ÷ -->
      <button class="btn btn--func"    data-action="clear"     aria-label="Limpar">C</button>
      <button class="btn btn--func"    data-action="backspace"  aria-label="Apagar">⌫</button>
      <button class="btn btn--func"    data-action="percent"    aria-label="Porcentagem">%</button>
      <button class="btn btn--op"      data-action="operator"   data-value="÷"  aria-label="Dividir">÷</button>

      <!-- Linha 2: 7  8  9  × -->
      <button class="btn btn--num"     data-action="digit"      data-value="7">7</button>
      <button class="btn btn--num"     data-action="digit"      data-value="8">8</button>
      <button class="btn btn--num"     data-action="digit"      data-value="9">9</button>
      <button class="btn btn--op"      data-action="operator"   data-value="×"  aria-label="Multiplicar">×</button>

      <!-- Linha 3: 4  5  6  − -->
      <button class="btn btn--num"     data-action="digit"      data-value="4">4</button>
      <button class="btn btn--num"     data-action="digit"      data-value="5">5</button>
      <button class="btn btn--num"     data-action="digit"      data-value="6">6</button>
      <button class="btn btn--op"      data-action="operator"   data-value="−"  aria-label="Subtrair">−</button>

      <!-- Linha 4: 1  2  3  + -->
      <button class="btn btn--num"     data-action="digit"      data-value="1">1</button>
      <button class="btn btn--num"     data-action="digit"      data-value="2">2</button>
      <button class="btn btn--num"     data-action="digit"      data-value="3">3</button>
      <button class="btn btn--op"      data-action="operator"   data-value="+"  aria-label="Somar">+</button>

      <!-- Linha 5: +/−  0  .  = -->
      <button class="btn btn--func"    data-action="toggle-sign" aria-label="Alternar sinal">+/−</button>
      <button class="btn btn--num"     data-action="digit"      data-value="0">0</button>
      <button class="btn btn--num"     data-action="decimal"    aria-label="Decimal">.</button>
      <button class="btn btn--equals"  data-action="equals"     aria-label="Igual">=</button>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
